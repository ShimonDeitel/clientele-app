name: Clientele
options:
  bundleIdPrefix: com.shimondeitel.clientelenotes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Clientele:
    type: application
    platform: iOS
    sources:
      - path: Clientele
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.clientelenotes
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Clientele/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ClienteleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClienteleTests
      - path: Clientele.storekit
    dependencies:
      - target: Clientele
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.clientelenotes.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ClienteleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ClienteleUITests
    dependencies:
      - target: Clientele
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.clientelenotes.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Clientele:
    build:
      targets:
        Clientele: all
        ClienteleTests: [test]
        ClienteleUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Clientele.storekit
    test:
      config: Debug
      storeKitConfiguration: Clientele.storekit
      targets:
        - ClienteleTests
        - ClienteleUITests
    archive:
      config: Release
